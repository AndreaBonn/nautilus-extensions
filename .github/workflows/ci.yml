name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
      - run: uv run ruff check .

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
      - run: uv sync --frozen --all-extras
      - run: uv run pytest tests/ -v --cov --cov-fail-under=70 --cov-report=json --junitxml=test-results.xml

      - name: Generate test badge
        if: always() && matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p badges
          python3 -c "
          import json, xml.etree.ElementTree as ET
          root = ET.parse('test-results.xml').getroot()
          suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
          tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
          failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
          errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
          passed = tests - failures - errors
          badge = {
              'schemaVersion': 1,
              'label': 'tests',
              'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
              'color': 'red' if failures + errors > 0 else 'brightgreen'
          }
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Generate coverage badge
        if: always() && matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        run: |
          python3 -c "
          import json, os
          if not os.path.exists('coverage.json'):
              badge = {'schemaVersion': 1, 'label': 'coverage', 'message': 'N/A', 'color': 'lightgrey'}
          else:
              with open('coverage.json') as f:
                  data = json.load(f)
              pct = round(data['totals']['percent_covered'])
              color = 'brightgreen' if pct >= 90 else 'green' if pct >= 80 else 'yellow' if pct >= 60 else 'red'
              badge = {'schemaVersion': 1, 'label': 'coverage', 'message': f'{pct}%', 'color': color}
          with open('badges/coverage-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badges
        if: always() && matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json badges/coverage-badge.json
          git diff --cached --quiet || git commit -m "ci: update badges [skip ci]"
          git push

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
      - run: uv sync --frozen --all-extras
      - run: uv run ruff check --select S .
      - run: uv run bandit -r . --exclude './.venv,./tests' -ll
      - run: uv run pip-audit
